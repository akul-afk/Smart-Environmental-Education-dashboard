<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Cycle Interactive Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0F172A; /* Dark background to match app */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .canvas-container {
            width: 100%;
            height: 100vh; /* Fill entire space */
            max-width: none; /* remove max-width constraints */
            background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 90vh;
            display: block;
        }

        /* --- Typography within SVG --- */
        text {
            font-family: 'Open Sans', sans-serif;
            fill: #E2E8F0;
        }
        .title { font-size: 42px; font-weight: 700; fill: #FFFFFF; }
        .label { font-size: 18px; font-weight: 600; fill: #F8FAFC; }
        .label-small { font-size: 12px; font-weight: 400; fill: #CBD5E1; }
        .label-white { fill: #fff; font-size: 20px; font-weight: 600; }

        /* --- Animations --- */
        
        /* Sun Rotation */
        .sun-spin {
            transform-origin: 1000px 180px;
            animation: spin 30s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Cloud Floating */
        .cloud-float-1 { animation: float1 12s ease-in-out infinite; }
        .cloud-float-2 { animation: float2 15s ease-in-out infinite reverse; }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 5px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(15px, -10px); }
        }

        /* Animal Breathing */
        .breathe {
            transform-origin: center;
            animation: breatheAnim 3s ease-in-out infinite alternate;
        }
        .breathe-delay { animation-delay: -1.5s; }
        @keyframes breatheAnim {
            0% { transform: scale(1); }
            100% { transform: scale(1.03) translateY(-2px); }
        }

        /* Flow Arrows */
        .flow-line {
            stroke-dasharray: 10 15;
            animation: flowDash 1.5s linear infinite;
        }
        .flow-line-reverse {
            stroke-dasharray: 10 15;
            animation: flowDashRev 1.5s linear infinite;
        }
        @keyframes flowDash { to { stroke-dashoffset: -25; } }
        @keyframes flowDashRev { to { stroke-dashoffset: 25; } }

        /* Wavy Emissions */
        .wavy-wave {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: waveRise 2s linear infinite;
            opacity: 0.8;
            stroke: #94A3B8; /* lighter smoke stroke for dark bg */
        }
        .wavy-wave:nth-child(2) { animation-delay: 0.6s; }
        .wavy-wave:nth-child(3) { animation-delay: 1.2s; }
        
        @keyframes waveRise {
            0% { stroke-dashoffset: 60; opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; transform: translateY(-15px); }
        }

        /* Smoke Bubbles */
        .smoke-bubble {
            animation: smokeRise 3.5s ease-in infinite;
            opacity: 0;
        }
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px) scale(2.5); opacity: 0; }
        }

        /* Hover Interactions */
        .interactive-zone { transition: filter 0.3s ease; cursor: pointer; }
        .interactive-zone:hover { filter: brightness(1.2); }

        /* Tooltip & Hover Targets */
        .hover-target { cursor: help; }
        .hover-target:hover text { fill: #60A5FA; transition: fill 0.2s; }
        .hover-target:hover .label-white { fill: #FDE047; }
        .hover-target:hover > path:not([stroke="transparent"]) { filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95); /* Dark background */
            border-left: 5px solid #F97316;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1000;
            font-family: 'Open Sans', sans-serif;
            font-size: 14px;
            color: #E2E8F0;
            transform: translate(-50%, -100%);
            left: 0;
            top: 0;
        }
        .tooltip h4 { margin-bottom: 8px; color: #FFFFFF; font-size: 16px; font-weight: 700; }
        .tooltip p { line-height: 1.4; margin: 0; }

        /* Overrides for stroke lines on dark bg */
        #wavy-line { stroke: #94A3B8; }
    </style>
</head>
<body>

<div class="canvas-container">
    <!-- Single unified SVG ViewBox for perfect scaling -->
    <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
        
        <defs>
            <!-- Drop Shadows -->
            <filter id="shadow-light" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
            </filter>
            <filter id="shadow-heavy" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="15" stdDeviation="10" flood-color="#000" flood-opacity="0.5" />
            </filter>
            <filter id="shadow-cloud" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="-5" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.25" />
            </filter>

            <!-- Gradients -->
            <linearGradient id="grad-mountain-1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#334155" />
                <stop offset="100%" stop-color="#1E293B" />
            </linearGradient>
            <linearGradient id="grad-mountain-2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#475569" />
                <stop offset="100%" stop-color="#334155" />
            </linearGradient>
            <linearGradient id="grad-factory" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#64748B" />
                <stop offset="100%" stop-color="#475569" />
            </linearGradient>
            <linearGradient id="grad-grass" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#4ADE80" />
                <stop offset="100%" stop-color="#22C55E" />
            </linearGradient>
            <linearGradient id="grad-dirt" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#A16207" />
                <stop offset="100%" stop-color="#713F12" />
            </linearGradient>
            <linearGradient id="grad-fossil" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#475569" />
                <stop offset="100%" stop-color="#1E293B" />
            </linearGradient>

            <!-- Arrowheads -->
            <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#F8FAFC" />
            </marker>

            <!-- Reusable Wavy Line -->
            <path id="wavy-line" d="M0,40 Q8,30 0,20 T0,0 T0,-20 T0,-40" fill="none" stroke="#F8FAFC" stroke-width="2.5" />

            <!-- Reusable Tree -->
            <g id="tree" class="interactive-zone">
                <rect x="-4" y="0" width="8" height="30" fill="#713F12" />
                <path d="M0,-40 C15,-40 25,-20 20,5 C15,15 -15,15 -20,5 C-25,-20 -15,-40 0,-40 Z" fill="#15803D" />
                <!-- Tree Highlight/Shadow -->
                <path d="M0,-40 C15,-40 25,-20 20,5 C20,5 0,-10 0,-40 Z" fill="#22C55E" opacity="0.6"/>
            </g>

            <!-- Reusable Sheep -->
            <g id="sheep" class="interactive-zone">
                <!-- Shadow -->
                <ellipse cx="0" cy="22" rx="20" ry="5" fill="#000" opacity="0.15" />
                <!-- Legs -->
                <rect x="-12" y="10" width="4" height="12" rx="2" fill="#3d2b1f" />
                <rect x="-4" y="12" width="4" height="10" rx="2" fill="#2a1d15" />
                <rect x="8" y="10" width="4" height="12" rx="2" fill="#3d2b1f" />
                <rect x="16" y="12" width="4" height="10" rx="2" fill="#2a1d15" />
                <!-- Fluffy Body -->
                <path d="M-15,0 C-25,-10 -15,-20 0,-20 C15,-20 25,-10 20,5 C20,15 5,15 -10,12 Z" fill="#F1F5F9" filter="url(#shadow-light)" />
                <path d="M-10,-5 C-15,-15 -5,-25 5,-22 C15,-20 15,-10 10,0 Z" fill="#CBD5E1" />
                <!-- Head -->
                <path d="M-18,-8 C-25,-8 -25,5 -18,10 C-10,10 -10,-8 -18,-8 Z" fill="#B45309" />
                <circle cx="-16" cy="0" r="8" fill="#78350F" />
                <!-- Ears & Eyes -->
                <ellipse cx="-22" cy="-2" rx="4" ry="1.5" fill="#78350F" transform="rotate(-20 -22 -2)" />
                <ellipse cx="-10" cy="-2" rx="4" ry="1.5" fill="#78350F" transform="rotate(20 -10 -2)" />
                <circle cx="-19" cy="-1" r="1.5" fill="#fff" />
                <circle cx="-13" cy="-1" r="1.5" fill="#fff" />
                <circle cx="-19.5" cy="-1" r="0.8" fill="#000" />
                <circle cx="-13.5" cy="-1" r="0.8" fill="#000" />
            </g>
        </defs>

        <!-- ================= BACKGROUND ELEMENTS ================= -->
        
        <!-- Mountains -->
        <g transform="translate(0, -30)">
            <!-- Back Mountain -->
            <polygon points="450,550 600,280 750,550" fill="url(#grad-mountain-2)" />
            <polygon points="600,280 750,550 670,550" fill="#1E293B" opacity="0.4" />
            
            <!-- Front Mountain -->
            <polygon points="200,550 400,220 650,550" fill="url(#grad-mountain-1)" filter="url(#shadow-light)" />
            <polygon points="400,220 650,550 500,550" fill="#0F172A" opacity="0.3" />
        </g>

        <!-- Sun -->
        <g transform="translate(1000, 180)" class="sun-spin" filter="url(#shadow-light)">
            <!-- Red Jagged Rays -->
            <path d="M0,-70 L15,-45 L45,-55 L35,-25 L65,-15 L45,10 L65,40 L35,30 L15,60 L0,40 L-15,60 L-35,30 L-65,40 L-45,10 L-65,-15 L-35,-25 L-45,-55 L-15,-45 Z" fill="#F97316" />
            <!-- Cream Core -->
            <circle cx="0" cy="0" r="35" fill="#FEF08A" />
        </g>

        <!-- Clouds -->
        <g class="cloud-float-1" filter="url(#shadow-cloud)">
            <path d="M820,150 a30,30 0 0,1 0,-60 a45,45 0 0,1 80,-15 a35,35 0 0,1 45,45 a30,30 0 0,1 -10,55 z" fill="#94A3B8" />
        </g>
        <g class="cloud-float-2" filter="url(#shadow-cloud)" transform="translate(-150, -30) scale(0.8)">
            <path d="M900,180 a25,25 0 0,1 0,-50 a35,35 0 0,1 60,-10 a25,25 0 0,1 30,30 a20,20 0 0,1 -10,40 z" fill="#94A3B8" />
        </g>


        <!-- ================= 3D GROUND SLICE ================= -->
        <g filter="url(#shadow-heavy)" transform="translate(0, -20)">
            
            <!-- Bottom Layer (Fossil Fuels) -->
            <path d="M 100,660 C 300,740 900,740 1100,660 L 1100,710 C 900,800 300,800 100,710 Z" fill="url(#grad-fossil)" />
            
            <!-- Middle Layer (Dead Organisms/Soil) -->
            <path d="M 100,560 C 300,650 900,650 1100,560 L 1100,660 C 900,740 300,740 100,660 Z" fill="url(#grad-dirt)" />
            
            <!-- Top Surface Base (Grey/Industrial side) -->
            <path d="M 100,560 C 300,650 900,650 1100,560 C 1100,480 850,450 600,450 C 350,450 100,480 100,560 Z" fill="#334155" />
            
            <!-- Top Surface Overlay (Green/Nature side) -->
            <!-- Creating an organic curved split between industrial and nature -->
            <path d="M 450,595 C 650,640 900,650 1100,560 C 1100,480 850,450 600,450 C 500,450 420,520 450,595 Z" fill="url(#grad-grass)" />
            
            <!-- Thin border line to enhance 3D top edge -->
            <path d="M 100,560 C 300,650 900,650 1100,560" fill="none" stroke="#64748B" stroke-width="3" opacity="0.4" />
        </g>


        <!-- ================= FACTORY & SMOKE ================= -->
        <!-- Smoke Bubbles (placed behind factory but in front of mountains) -->
        <g transform="translate(180, 480)">
            <circle cx="20" cy="-120" r="25" fill="#1E293B" class="smoke-bubble" style="animation-delay: 0s;" />
            <circle cx="0" cy="-140" r="40" fill="#334155" class="smoke-bubble" style="animation-delay: 0.8s;" />
            <circle cx="40" cy="-100" r="30" fill="#475569" class="smoke-bubble" style="animation-delay: 1.6s;" />
            <circle cx="-10" cy="-160" r="45" fill="#1E293B" class="smoke-bubble" style="animation-delay: 2.2s;" />
            
            <circle cx="70" cy="-110" r="20" fill="#475569" class="smoke-bubble" style="animation-delay: 0.4s;" />
            <circle cx="60" cy="-150" r="35" fill="#334155" class="smoke-bubble" style="animation-delay: 1.3s;" />
        </g>

        <!-- Factory Building -->
        <g transform="translate(150, 410)" class="interactive-zone" filter="url(#shadow-light)">
            <!-- Back Smokestacks -->
            <rect x="15" y="-80" width="25" height="100" fill="#475569" />
            <polygon points="15,-80 40,-80 40,20 25,20" fill="#1E293B" opacity="0.3"/>
            
            <rect x="55" y="-110" width="30" height="130" fill="#334155" />
            <polygon points="55,-110 85,-110 85,20 70,20" fill="#1E293B" opacity="0.3"/>
            
            <!-- Main Building Blocks -->
            <rect x="0" y="20" width="220" height="80" fill="url(#grad-factory)" rx="4" />
            <rect x="130" y="-15" width="90" height="35" fill="#64748B" rx="2" />
            
            <!-- Building Details (Windows/Doors) -->
            <rect x="20" y="50" width="15" height="50" fill="#0F172A" />
            <rect x="50" y="40" width="20" height="15" fill="#0F172A" />
            <rect x="80" y="40" width="20" height="15" fill="#0F172A" />
            <rect x="150" y="0" width="15" height="10" fill="#0F172A" />
            <rect x="180" y="0" width="15" height="10" fill="#0F172A" />
            
            <!-- Front pipe detail -->
            <path d="M 110,20 L 110,60 L 200,60" fill="none" stroke="#94A3B8" stroke-width="6" stroke-linejoin="round" />
        </g>


        <!-- ================= NATURE (TREES & SHEEP) ================= -->
        <!-- Trees (Layered for depth) -->
        <g transform="translate(0, 0)">
            <use href="#tree" x="780" y="440" transform="scale(1.2) translate(-130, -70)" />
            <use href="#tree" x="830" y="420" transform="scale(1.4) translate(-230, -120)" />
            <use href="#tree" x="870" y="450" transform="scale(1.1) translate(-80, -40)" />
            <use href="#tree" x="910" y="420" transform="scale(1.6) translate(-340, -160)" />
            <use href="#tree" x="960" y="460" transform="scale(1.3) translate(-220, -100)" />
            <use href="#tree" x="1000" y="430" transform="scale(1.5) translate(-330, -140)" />
            <use href="#tree" x="1060" y="480" transform="scale(1.1) translate(-90, -40)" />
        </g>

        <!-- Sheep (With breathing animations) -->
        <g>
            <use href="#sheep" x="520" y="490" transform="scale(1.3) translate(-120, -110)" class="breathe" />
            <use href="#sheep" x="650" y="450" transform="scale(1)" class="breathe breathe-delay" />
            <use href="#sheep" x="600" y="520" transform="scale(1.4) translate(-170, -150)" class="breathe" />
            <use href="#sheep" x="690" y="540" transform="scale(1.1) translate(-60, -40)" class="breathe breathe-delay" />
            <use href="#sheep" x="550" y="440" transform="scale(0.9) translate(60, 50)" class="breathe" />
        </g>


        <!-- ================= INTERACTIVE FLOWS & LABELS ================= -->
        
        <!-- Title -->
        <text x="40" y="80" class="title">Carbon Cycle</text>

        <!-- CO2 Badge & Label -->
        <g class="hover-target" transform="translate(480, 140)" data-title="Atmospheric Carbon" data-desc="Carbon dioxide (CO₂) is a greenhouse gas. It traps heat and plays a critical role in regulating Earth's temperature.">
            <rect x="-10" y="-35" width="220" height="70" fill="transparent" />
            <circle cx="20" cy="-5" r="28" fill="#F97316" filter="url(#shadow-light)" />
            <text x="3" y="1" font-size="18" font-weight="700">CO<tspan dy="6" font-size="12">2</tspan></text>
            <text x="60" y="1" class="label">in the atmosphere</text>
            <text x="40" y="22" class="label-small">Carbon dioxide</text>
        </g>

        <!-- Auto/Factory Emission -->
        <g class="hover-target" data-title="Auto and Factory Emission" data-desc="Burning fossil fuels by vehicles and factories releases large amounts of stored carbon back into the atmosphere as CO₂.">
            <rect x="160" y="220" width="220" height="70" fill="transparent" />
            <text x="180" y="240" class="label">Auto and factory emission</text>
            <g transform="translate(300, 260)">
                <use href="#wavy-line" x="-15" class="wavy-wave" />
                <use href="#wavy-line" x="5" class="wavy-wave" />
                <use href="#wavy-line" x="25" class="wavy-wave" />
            </g>
        </g>

        <!-- Animal Respiration -->
        <g class="hover-target" data-title="Animal Respiration" data-desc="Animals breathe in oxygen and exhale carbon dioxide as a byproduct of breaking down their food for energy.">
            <rect x="460" y="320" width="180" height="60" fill="transparent" />
            <text x="480" y="340" class="label">Animal Respiration</text>
            <g transform="translate(580, 360)">
                <use href="#wavy-line" x="-15" class="wavy-wave" />
                <use href="#wavy-line" x="5" class="wavy-wave" />
                <use href="#wavy-line" x="25" class="wavy-wave" />
            </g>
        </g>

        <!-- Plant Respiration -->
        <g class="hover-target" data-title="Plant Respiration" data-desc="Like animals, plants also respire. They consume oxygen and release carbon dioxide to use the energy stored in sugars.">
            <rect x="710" y="280" width="160" height="60" fill="transparent" />
            <text x="730" y="300" class="label">Plant Respiration</text>
            <g transform="translate(820, 320)">
                <use href="#wavy-line" x="-15" class="wavy-wave" />
                <use href="#wavy-line" x="5" class="wavy-wave" />
                <use href="#wavy-line" x="25" class="wavy-wave" />
            </g>
        </g>

        <!-- Photosynthesis -->
        <g class="hover-target" data-title="Photosynthesis" data-desc="Plants, algae, and some bacteria use sunlight to absorb CO₂ from the atmosphere and convert it into organic matter (sugars).">
            <path d="M 1000,280 Q 1050,380 980,440" fill="none" stroke="transparent" stroke-width="40" />
            <rect x="920" y="360" width="160" height="40" fill="transparent" />
            <text x="940" y="380" class="label">Photosynthesis</text>
            <path d="M 1000,280 Q 1050,380 980,440" fill="none" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow-black)" />
            <path d="M 1000,280 Q 1050,380 980,440" fill="none" stroke="#FDE047" stroke-width="3" class="flow-line" />
        </g>

        <!-- Organic Carbon -->
        <g class="hover-target" data-title="Organic Carbon & Decay" data-desc="When plants die or shed leaves, their organic carbon enters the soil. Microorganisms break it down, eventually releasing CO₂.">
            <path d="M 940,510 Q 880,590 770,580" fill="none" stroke="transparent" stroke-width="40" />
            <rect x="840" y="540" width="160" height="40" fill="transparent" />
            <text x="860" y="560" class="label">Organic carbon</text>
            <path d="M 940,510 Q 880,590 770,580" fill="none" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow-black)" />
            <path d="M 940,510 Q 880,590 770,580" fill="none" stroke="#FDE047" stroke-width="3" class="flow-line" />
        </g>

        <!-- Animal to Dead Organisms -->
        <g class="hover-target" data-title="Dead Organisms & Waste" data-desc="Waste products from animals and dead organic matter accumulate in the soil, forming a vital part of the terrestrial carbon sink.">
            <path d="M 580,560 Q 600,610 600,640" fill="none" stroke="transparent" stroke-width="40" />
            <rect x="420" y="640" width="340" height="40" fill="transparent" />
            <text x="430" y="660" class="label-white" filter="url(#shadow-light)">Dead organisms and waste products</text>
            <path d="M 580,560 Q 600,610 600,640" fill="none" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow-black)" />
            <path d="M 580,560 Q 600,610 600,640" fill="none" stroke="#60A5FA" stroke-width="3" class="flow-line" />
        </g>

        <!-- Fossils & Fossil Fuels -->
        <g class="hover-target" data-title="Fossilization" data-desc="Over millions of years, organic matter buried under intense heat and pressure deep within the Earth transforms into fossil fuels like coal and oil.">
            <path d="M 600,680 L 600,720" fill="none" stroke="transparent" stroke-width="40" />
            <rect x="470" y="725" width="240" height="40" fill="transparent" />
            <text x="490" y="745" class="label-white" filter="url(#shadow-light)">Fossils and fossil fuels</text>
            <path d="M 600,680 L 600,720" fill="none" stroke="#E2E8F0" stroke-width="4" marker-end="url(#arrow-black)" />
            <path d="M 600,680 L 600,720" fill="none" stroke="#A78BFA" stroke-width="3" class="flow-line" />
        </g>

        <!-- Extraction -->
        <g class="hover-target" data-title="Extraction" data-desc="Humans extract fossil fuels from underground to use for energy, rapidly removing carbon from long-term storage and re-introducing it to the active cycle.">
            <path d="M 330,700 C 150,680 150,600 180,540" fill="none" stroke="transparent" stroke-width="40" />
            <path d="M 330,700 C 150,680 150,600 180,540" fill="none" stroke="#EF4444" stroke-width="4" marker-end="url(#arrow-black)" />
            <path d="M 330,700 C 150,680 150,600 180,540" fill="none" stroke="#FCA5A5" stroke-width="3" class="flow-line-reverse" />
        </g>

    </svg>
</div>

<!-- Tooltip Container -->
<div class="tooltip" id="info-tooltip">
    <h4 id="tooltip-title">Title</h4>
    <p id="tooltip-desc">Description goes here.</p>
</div>

<!-- Interaction Script -->
<script>
    const tooltip = document.getElementById('info-tooltip');
    const tooltipTitle = document.getElementById('tooltip-title');
    const tooltipDesc = document.getElementById('tooltip-desc');
    const targets = document.querySelectorAll('.hover-target');

    targets.forEach(target => {
        target.addEventListener('mouseenter', (e) => {
            tooltipTitle.textContent = target.getAttribute('data-title');
            tooltipDesc.textContent = target.getAttribute('data-desc');
            tooltip.style.opacity = '1';
        });
        target.addEventListener('mousemove', (e) => {
            let x = e.pageX;
            let y = e.pageY - 25; 
            
            // Basic boundary detection to keep tooltip on-screen
            const tooltipRect = tooltip.getBoundingClientRect();
            if (x + tooltipRect.width / 2 > window.innerWidth) {
                x = window.innerWidth - tooltipRect.width / 2 - 10;
            }
            if (x - tooltipRect.width / 2 < 0) {
                x = tooltipRect.width / 2 + 10;
            }

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        });
        target.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
        });
    });
</script>

</body>
</html>
